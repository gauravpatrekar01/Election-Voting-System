<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Voting DApp</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="card">

      <h2>🗳 Voting DApp</h2>

      <div class="field">
        <label>Select Candidate</label>
        <select id="candidate" title="candidate"></select>
      </div>

      <button onclick="vote()">Cast Vote</button>

      <div class="results-section">
        <h3>Results</h3>
        <ul id="results"></ul>
      </div>

    </div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/web3@1.10.0/dist/web3.min.js"></script>

<script>
let web3;
let contract;
let accounts;

// ✅ Your contract address
const address = "0xC17564AF2281F6C9E050AF130C78B8D4B3FffC2F";

// ✅ Your ABI
const abi = [
  {
    "inputs": [],
    "stateMutability": "nonpayable",
    "type": "constructor"
  },
  {
    "inputs": [{"internalType": "uint256","name": "","type": "uint256"}],
    "name": "candidates",
    "outputs": [
      {"internalType": "uint256","name": "id","type": "uint256"},
      {"internalType": "string","name": "name","type": "string"},
      {"internalType": "uint256","name": "voteCount","type": "uint256"}
    ],
    "stateMutability": "view",
    "type": "function"
  },
  {
    "inputs": [],
    "name": "candidatesCount",
    "outputs": [{"internalType": "uint256","name": "","type": "uint256"}],
    "stateMutability": "view",
    "type": "function"
  },
  {
    "inputs": [{"internalType": "address","name": "","type": "address"}],
    "name": "voters",
    "outputs": [{"internalType": "bool","name": "","type": "bool"}],
    "stateMutability": "view",
    "type": "function"
  },
  {
    "inputs": [{"internalType": "uint256","name": "_id","type": "uint256"}],
    "name": "vote",
    "outputs": [],
    "stateMutability": "nonpayable",
    "type": "function"
  }
];

window.addEventListener("load", async () => {
  if (window.ethereum) {
    try {
      web3 = new Web3(window.ethereum);

      await window.ethereum.request({ method: "eth_requestAccounts" });
      accounts = await web3.eth.getAccounts();

      contract = new web3.eth.Contract(abi, address);

      loadCandidates();
    } catch (error) {
      console.error(error);
      alert("Error connecting to MetaMask");
    }
  } else {
    alert("MetaMask extension is not installed or not enabled in your browser. This application requires MetaMask to connect to the Ethereum blockchain.Please install MetaMask from https://metamask.io, create or import a wallet, connect to the Localhost (Ganache) network, and refresh the page.");
  }
});

async function loadCandidates() {
  const count = await contract.methods.candidatesCount().call();

  const select = document.getElementById("candidate");
  const results = document.getElementById("results");

  select.innerHTML = "";
  results.innerHTML = "";

  for (let i = 1; i <= count; i++) {
    const candidate = await contract.methods.candidates(i).call();

    // Dropdown
    const option = document.createElement("option");
    option.value = candidate.id;
    option.text = candidate.name;
    select.appendChild(option);

    // Results list
    const li = document.createElement("li");
    li.innerText = `${candidate.name} - Votes: ${candidate.voteCount}`;
    results.appendChild(li);
  }
}

async function vote() {
  try {
    const id = document.getElementById("candidate").value;

    await contract.methods.vote(id).send({
      from: accounts[0]
    });

    alert("Vote Casted Successfully!");

    // Refresh results after voting
    loadCandidates();

  } catch (error) {
    console.error(error);
    alert("Transaction Failed (Maybe already voted)");
  }
}
</script>

</body>
</html>
